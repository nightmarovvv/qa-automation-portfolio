<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 460" preserveAspectRatio="xMidYMid meet" role="img" aria-label="qa-automation-portfolio — tests that fail loudly, on purpose">
  <defs>
    <style>
      .bg { fill: #030303; }
      .micro { fill: #8b8b8b; font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 16px; letter-spacing: 4.5px; }
      .title { fill: #f5f1ea; font-family: "DM Serif Display", Georgia, "Times New Roman", serif; font-size: 124px; }
      .accent { fill: #e8e2da; font-style: italic; }
      .sub { fill: #b9b3aa; font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 26px; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="460"/>

  <text class="micro" x="70" y="78" opacity="0">
    ALEX SHABUNIN  ·  QA AUTOMATION  ·  2026
    <animate attributeName="opacity" from="0" to="1" begin="0s"   dur="0.7s" fill="freeze"/>
  </text>

  <text class="title" x="70" y="220" opacity="0">
    Tests that fail <tspan class="accent">loudly,</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="0.25s" dur="0.9s" fill="freeze"/>
  </text>

  <text class="title" x="70" y="335" opacity="0">
    on purpose.
    <animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.9s" fill="freeze"/>
  </text>

  <line x1="70" y1="380" x2="70" y2="380" stroke="#e8e2da" stroke-width="1">
    <animate attributeName="x2" from="70" to="290" begin="0.9s" dur="0.9s" fill="freeze"/>
  </line>

  <text class="sub" x="70" y="415" opacity="0">
    pytest + Playwright + POM  ·  vedro + d42  ·  requests + ApiManager
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.9s" fill="freeze"/>
  </text>

  <circle cx="1530" cy="70" r="4" fill="#e8e2da" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
