name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui-pytest, ui-vedro]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps (api suite)
        if: matrix.suite == 'api'
        run: pip install -r backend/requirements.txt

      - name: Start backend (api suite)
        if: matrix.suite == 'api'
        run: |
          nohup uvicorn --app-dir backend main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/v1/health > /dev/null && break
            sleep 0.3
          done

      - name: Install api suite deps
        if: matrix.suite == 'api'
        run: pip install -r api/requirements.txt

      - name: Run api suite
        if: matrix.suite == 'api'
        working-directory: api
        run: pytest -v

      - name: Install ui-pytest deps
        if: matrix.suite == 'ui-pytest'
        run: |
          pip install -r ui-pytest/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run ui-pytest suite
        if: matrix.suite == 'ui-pytest'
        working-directory: ui-pytest
        run: pytest -v

      - name: Install ui-vedro deps
        if: matrix.suite == 'ui-vedro'
        working-directory: ui-vedro
        run: |
          pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Run ui-vedro suite
        if: matrix.suite == 'ui-vedro'
        working-directory: ui-vedro
        run: |
          # the Makefile boots the SPA, runs vedro, tears it down
          make test

      - name: Inject allure environment + executor
        if: always()
        run: |
          mkdir -p ${{ matrix.suite }}/allure-results
          {
            echo "Python=$(python --version 2>&1 | cut -d' ' -f2)"
            echo "OS=Ubuntu 24.04 (ubuntu-latest)"
            echo "Suite=${{ matrix.suite }}"
            echo "CI.run=${{ github.run_number }}"
            echo "CI.workflow=${{ github.workflow }}"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${GITHUB_SHA:0:7}"
            echo "Triggered.by=${{ github.actor }}"
          } > ${{ matrix.suite }}/allure-results/environment.properties

          cat > ${{ matrix.suite }}/allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "#${{ github.run_number }} · ${{ matrix.suite }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "qa-automation-portfolio · ${{ matrix.suite }}",
            "reportUrl": "https://nightmarovvv.github.io/qa-automation-portfolio/report/"
          }
          EOF

      - name: Upload allure-results
        if: always()
        continue-on-error: true  # Azure blob storage can be flaky; tests already passed
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.suite }}
          path: |
            ${{ matrix.suite }}/allure-results
          retention-days: 14

  publish-report:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download api results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-api
          path: allure-merged/api

      - name: Download ui-pytest results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-ui-pytest
          path: allure-merged/ui-pytest

      - name: Download ui-vedro results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-ui-vedro
          path: allure-merged/ui-vedro

      - name: Flatten results + drop in categories
        run: |
          mkdir -p allure-results
          # prefix each result file with the suite name so test ids don't collide
          for suite in api ui-pytest ui-vedro; do
            if [ -d "allure-merged/$suite" ]; then
              find "allure-merged/$suite" -maxdepth 1 -type f | while read f; do
                cp "$f" "allure-results/${suite}__$(basename "$f")"
              done
            fi
          done
          cp docs/allure/categories.json allure-results/categories.json

      - name: Pull previous Allure history snapshot (for TREND block)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: allure-history-snapshot
          workflow: ci.yml
          workflow_conclusion: success
          branch: main
          path: previous-history

      - name: Restore history into allure-results
        run: |
          if [ -d previous-history/history ]; then
            cp -r previous-history/history allure-results/history
            echo "history restored from previous run"
            ls allure-results/history | head -10
          else
            echo "no previous history yet — first build of trend chart"
          fi

      - name: Install Allure CLI
        run: |
          curl -sSL https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz | tar -xz
          echo "$PWD/allure-2.30.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Stash history for the next run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-history-snapshot
          path: allure-report/history
          retention-days: 90

      - name: Assemble pages site (landing at /, allure at /report/)
        run: |
          mkdir -p site
          cp -r docs/landing/* site/
          # the landing references ../img/*.gif — bring those next to it
          mkdir -p site/img
          cp -r docs/img/* site/img/ 2>/dev/null || true
          # also expose ../img path the landing uses
          ln -s img site/landing-img 2>/dev/null || true
          # but the landing actually points to ../img — we serve the landing
          # from /, so we need img/* at /img/* AND the html at /. Fix the
          # relative paths in the html to use img/ instead of ../img/.
          # escape the dots so sed doesn't eat "docs/img/" too
          sed -i 's|\.\./img/|img/|g' site/index.html
          # allure report
          mkdir -p site/report
          cp -r allure-report/* site/report/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
